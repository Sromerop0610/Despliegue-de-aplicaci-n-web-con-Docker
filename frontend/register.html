<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registro en Read Books">
    <meta name="author" content="Sara Romero">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Registro | Read Books</title>
</head>

<body>

<header class="cabecera">
    <div class="header_container">
        <a href="index.html">
            <img class="logo_imagen" src="assets/images/logo.png" alt="Logo de la web">
        </a>
        <h1>Read Books</h1>
    </div>
</header>

<main class="login_container">

    <section class="login_card">

        <h2>Crear cuenta</h2>
        <p class="login_subtexto">Regístrate para acceder a tu biblioteca</p>

        <form id="registerForm" class="login_form">

            <div class="input_group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required>
            </div>

            <div class="input_group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="boton secundario login_btn">
                Registrarse
            </button>

        </form>

        <p class="registro">
            ¿Ya tienes cuenta?
            <a href="login.html">Inicia sesión</a>
        </p>

    </section>

</main>
</body>
</html>

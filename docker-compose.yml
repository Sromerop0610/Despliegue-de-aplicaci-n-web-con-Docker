version: "3.9"

services:

  db:
    image: mysql:8
    container_name: mysql_readbooks
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: readbooks

    ports:
      - "3307:3306"

    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: backend_readbooks
    restart: always

    ports:
      - "3001:3000"

    depends_on:
      - db

volumes:
  db_data: